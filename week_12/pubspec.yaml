name: week_12
description: "Delivery Tracking App - Offline Capable"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Local Storage (Offline Cache)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File path (required by Hive)
  path_provider: ^2.1.2

  # Network detection (Offline mode)
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Hive code generation (optional if you later use adapters)
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  # Optional (if you add assets later)
  # assets:
  #   - assets/images/

  # Optional fonts
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf